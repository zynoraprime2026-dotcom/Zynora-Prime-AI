<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zynora Prime</title>

    <!-- PWA: makes the app installable to a home screen and run in its
         own window instead of a browser tab -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0B0E1A" />

    <!-- iOS doesn't read manifest.json for most of this — it needs its
         own separate meta tags to behave like an installed app -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Zynora Prime" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
